services:
  - type: web
    name: memory-mcp
    env: python
    pythonVersion: 3.11
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:mcp --host 0.0.0.0 --port $PORT
    envVars:
      - key: MEMORY_API_KEY
        scope: run
        description: "REQUIRED: Secret API key for all MCP requests (minimum 32 characters)"
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        scope: run
        description: "OPTIONAL: Firebase service account JSON (if using Firebase/Firestore)"
      - key: CLOUDINARY_CLOUD_NAME
        scope: run
        description: "OPTIONAL: Cloudinary cloud name (if using Cloudinary for file storage)"
      - key: CLOUDINARY_API_KEY
        scope: run
        description: "OPTIONAL: Cloudinary API key"
      - key: CLOUDINARY_API_SECRET
        scope: run
        description: "OPTIONAL: Cloudinary API secret"
      - key: NVIDIA_API_KEY
        scope: run
        description: "OPTIONAL: NVIDIA API key (for summarization)"
      - key: HOST
        scope: run
        value: "0.0.0.0"
        description: "Server host (all interfaces)"
      - key: PORT
        scope: run
        value: "8000"
        description: "Server port"
    
    headers:
      - path: /health
        name: X-Health-Check
        value: "true"
    
    healthCheckPath: /health
    autoDeploy: true
    maxInstances: 4
    numInstances: 1
